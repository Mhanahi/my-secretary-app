<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <meta name="theme-color" content="#FAF3E8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Secretary" />
  <title>My Secretary</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #FAF3E8; font-family: 'Nunito', sans-serif; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #8B5E3C55; border-radius: 4px; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const C = { yellow:"#C8A96E",lime:"#A0785A",sky:"#D4B896",teal:"#8B5E3C",orange:"#E8D5B7",blue:"#6B3F2A",pink:"#B8865A",purple:"#7A4F35",bg:"#FAF3E8",card:"#FFF9F2",text:"#3B1F0E",muted:"#A08060" };

    const IcoStar=({s=20,c=C.yellow})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z" fill={c} stroke={c} strokeWidth="1" strokeLinejoin="round"/></svg>;
    const IcoCheck=({s=20,c=C.teal})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill={c} opacity="0.2"/><circle cx="12" cy="12" r="10" stroke={c} strokeWidth="2"/><path d="M7 12.5l3.5 3.5 6.5-7" stroke={c} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>;
    const IcoCal=({s=20,c=C.sky})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="17" rx="3" fill={c} opacity="0.15" stroke={c} strokeWidth="1.8"/><path d="M3 10h18" stroke={c} strokeWidth="1.8"/><path d="M8 3v4M16 3v4" stroke={c} strokeWidth="2" strokeLinecap="round"/><circle cx="8" cy="15" r="1.5" fill={c}/><circle cx="12" cy="15" r="1.5" fill={c}/><circle cx="16" cy="15" r="1.5" fill={c}/></svg>;
    const IcoBag=({s=20,c=C.orange})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none"><rect x="4" y="9" width="16" height="12" rx="2" fill={c} opacity="0.2" stroke={c} strokeWidth="1.8"/><path d="M9 9V7a3 3 0 016 0v2" stroke={c} strokeWidth="1.8" strokeLinecap="round"/><path d="M8 13h8" stroke={c} strokeWidth="1.8" strokeLinecap="round"/></svg>;
    const IcoHeart=({s=20,c=C.lime})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M12 21C12 21 3 15 3 9a5 5 0 019-3 5 5 0 019 3c0 6-9 12-9 12z" fill={c} opacity="0.25" stroke={c} strokeWidth="1.8" strokeLinejoin="round"/></svg>;
    const IcoPeople=({s=20,c=C.blue})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none"><circle cx="9" cy="7" r="3.5" fill={c} opacity="0.2" stroke={c} strokeWidth="1.8"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke={c} strokeWidth="1.8" strokeLinecap="round"/><circle cx="17" cy="8" r="2.5" stroke={c} strokeWidth="1.6"/><path d="M21 20c0-2.8-1.8-5-4-5" stroke={c} strokeWidth="1.6" strokeLinecap="round"/></svg>;
    const IcoBrief=({s=20,c=C.teal})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none"><rect x="3" y="9" width="18" height="12" rx="2" fill={c} opacity="0.15" stroke={c} strokeWidth="1.8"/><path d="M8 9V7a4 4 0 018 0v2" stroke={c} strokeWidth="1.8" strokeLinecap="round"/><path d="M3 14h18" stroke={c} strokeWidth="1.6"/><rect x="10" y="12" width="4" height="4" rx="1" fill={c}/></svg>;
    const IcoSpark=({s=22,c=C.yellow})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M12 2v4M12 18v4M2 12h4M18 12h4" stroke={c} strokeWidth="2" strokeLinecap="round"/><circle cx="12" cy="12" r="3" fill={c}/></svg>;
    const IcoHome=({s=22,c=C.lime})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M3 12L12 3l9 9" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/><path d="M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>;
    const IcoList=({s=22,c=C.lime})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none"><rect x="4" y="3" width="16" height="18" rx="3" fill={c} opacity="0.15" stroke={c} strokeWidth="1.8"/><path d="M8 8h8M8 12h8M8 16h5" stroke={c} strokeWidth="1.8" strokeLinecap="round"/></svg>;
    const IcoBot=({s=28,c=C.sky})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none"><rect x="4" y="8" width="16" height="12" rx="4" fill={c} opacity="0.2" stroke={c} strokeWidth="1.8"/><circle cx="9" cy="13" r="1.8" fill={c}/><circle cx="15" cy="13" r="1.8" fill={c}/><path d="M9 17.5c.8.7 1.5 1 3 1s2.2-.3 3-1" stroke={c} strokeWidth="1.5" strokeLinecap="round"/><path d="M12 8V5" stroke={c} strokeWidth="2" strokeLinecap="round"/><circle cx="12" cy="4" r="1.5" fill={c}/><path d="M4 14H2M22 14h-2" stroke={c} strokeWidth="1.8" strokeLinecap="round"/></svg>;
    const IcoSun=({s=16,c=C.yellow})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="5" fill={c} opacity="0.3" stroke={c} strokeWidth="1.8"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2" stroke={c} strokeWidth="2" strokeLinecap="round"/></svg>;

    const ILLU={work:<IcoBrief s={18}/>,personal:<IcoHeart s={18} c={C.pink}/>,health:<IcoHeart s={18} c={C.lime}/>,family:<IcoPeople s={18} c={C.purple}/>,shopping:<IcoBag s={18}/>,other:<IcoSpark s={18} c={C.purple}/>};
    const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
    const initTasks=[{id:1,text:"Call the dentist",done:false,priority:"high",category:"health",due:"2026-03-20"},{id:2,text:"Buy groceries",done:false,priority:"medium",category:"shopping",due:"2026-03-15"},{id:3,text:"Send birthday card to Mom",done:true,priority:"high",category:"family",due:"2026-03-10"}];
    const initEvents=[{id:1,title:"Team standup",date:"2026-03-14",time:"09:00",color:C.sky,category:"work"},{id:2,title:"Yoga class",date:"2026-03-15",time:"07:30",color:C.lime,category:"health"},{id:3,title:"Lunch with Sarah",date:"2026-03-13",time:"12:30",color:C.pink,category:"personal"},{id:4,title:"Doctor appointment",date:"2026-03-18",time:"15:00",color:C.purple,category:"health"}];

    const greeting=()=>{const h=new Date().getHours();return h<12?"Good morning":h<17?"Good afternoon":"Good evening";};

    function Avatar({name,size=36}){const cols=[C.yellow,C.lime,C.sky,C.pink,C.purple];const col=cols[name.charCodeAt(0)%cols.length];return <div style={{width:size,height:size,borderRadius:"50%",background:col,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:size*0.4,color:"#fff",flexShrink:0,fontFamily:"'Fredoka One',cursive",boxShadow:`0 3px 10px ${col}88`}}>{name[0].toUpperCase()}</div>;}
    function PriorityPill({priority}){const m={high:{bg:C.pink,label:"High"},medium:{bg:C.yellow,label:"Med"},low:{bg:C.lime,label:"Low"}};const{bg,label}=m[priority]||m.low;return <span style={{fontSize:10,fontWeight:700,background:bg+"44",color:C.text,padding:"2px 7px",borderRadius:20,fontFamily:"'Nunito',sans-serif"}}>{label}</span>;}

    function AIChat({onCommand}){
      const[msgs,setMsgs]=useState([{role:"assistant",text:"Hi! I'm your personal secretary. Tell me what you need — add tasks, schedule events, or just ask me anything!"}]);
      const[input,setInput]=useState("");const[loading,setLoading]=useState(false);const bottomRef=useRef(null);
      useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[msgs]);
      async function send(){
        if(!input.trim()||loading)return;const userMsg=input.trim();setInput("");setMsgs(m=>[...m,{role:"user",text:userMsg}]);setLoading(true);
        try{const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:`You are a helpful friendly personal secretary AI. No emojis. When adding a task: ACTION: {"type":"add_task","text":"...","priority":"high/medium/low","category":"work/personal/health/family/shopping/other","due":"YYYY-MM-DD or null"} When adding an event: ACTION: {"type":"add_event","title":"...","date":"YYYY-MM-DD","time":"HH:MM","category":"work/personal/health/family/other"} Keep responses short and warm. Today is ${new Date().toDateString()}.`,messages:[...msgs.map(m=>({role:m.role==="assistant"?"assistant":"user",content:m.text})),{role:"user",content:userMsg}]})});
        const data=await res.json();const text=data.content?.[0]?.text||"Sorry, couldn't process that.";
        const match=text.match(/ACTION:\s*(\{.*?\})/s);if(match){try{onCommand(JSON.parse(match[1]));}catch{}}
        setMsgs(m=>[...m,{role:"assistant",text:text.replace(/ACTION:\s*\{.*?\}/s,"").trim()}]);}catch{setMsgs(m=>[...m,{role:"assistant",text:"Something went wrong. Please try again."}]);}setLoading(false);
      }
      return(<div style={{display:"flex",flexDirection:"column",height:"100%"}}>
        <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:12}}>
          {msgs.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",gap:8,alignItems:"flex-end"}}>
            {m.role==="assistant"&&<div style={{width:34,height:34,borderRadius:"50%",background:`linear-gradient(135deg,${C.purple},${C.pink})`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><IcoBot s={20} c="#fff"/></div>}
            <div style={{maxWidth:"75%",padding:"10px 14px",borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",background:m.role==="user"?`linear-gradient(135deg,${C.purple},${C.pink})`:"#fff",color:m.role==="user"?"#fff":C.text,fontSize:14,lineHeight:1.55,boxShadow:"0 2px 8px rgba(0,0,0,0.07)",fontFamily:"'Nunito',sans-serif"}}>{m.text}</div>
          </div>)}
          {loading&&<div style={{display:"flex",gap:8,alignItems:"flex-end"}}><div style={{width:34,height:34,borderRadius:"50%",background:`linear-gradient(135deg,${C.purple},${C.pink})`,display:"flex",alignItems:"center",justifyContent:"center"}}><IcoBot s={20} c="#fff"/></div><div style={{padding:"12px 16px",background:"#fff",borderRadius:"18px 18px 18px 4px",boxShadow:"0 2px 8px rgba(0,0,0,0.07)",display:"flex",gap:5,alignItems:"center"}}>{[0,1,2].map(i=><span key={i} style={{width:7,height:7,borderRadius:"50%",background:C.teal,display:"inline-block",animation:`bounce 1s ${i*0.18}s infinite`}}/>)}</div></div>}
          <div ref={bottomRef}/>
        </div>
        <div style={{padding:"12px 16px",borderTop:`1px solid ${C.lime}44`,display:"flex",gap:8}}>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder='Try "Remind me to call mom Friday"' style={{flex:1,padding:"10px 16px",borderRadius:24,border:`1.5px solid ${C.sky}66`,outline:"none",fontSize:14,fontFamily:"'Nunito',sans-serif",background:"#fffaf5",color:C.text}}/>
          <button onClick={send} style={{width:44,height:44,borderRadius:"50%",border:"none",background:`linear-gradient(135deg,${C.purple},${C.pink})`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13" stroke="white" strokeWidth="2.2" strokeLinecap="round"/><path d="M22 2L15 22l-4-9-9-4 20-7z" stroke="white" strokeWidth="2.2" strokeLinejoin="round"/></svg></button>
        </div>
      </div>);
    }

    function CalendarView({events,onAddEvent}){
      const today=new Date();const[vd,setVd]=useState(new Date(today.getFullYear(),today.getMonth(),1));const[showForm,setShowForm]=useState(false);const[form,setForm]=useState({title:"",date:"",time:"",category:"personal"});
      const yr=vd.getFullYear(),mo=vd.getMonth();const firstDay=new Date(yr,mo,1).getDay();const dim=new Date(yr,mo+1,0).getDate();
      const cells=[...Array(firstDay).fill(null),...Array.from({length:dim},(_,i)=>i+1)];
      const getEv=d=>{const ds=`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;return events.filter(e=>e.date===ds);};
      const isToday=d=>d===today.getDate()&&mo===today.getMonth()&&yr===today.getFullYear();
      const upcoming=[...events].filter(e=>e.date>=today.toISOString().split("T")[0]).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,5);
      const inp={padding:"9px 12px",borderRadius:10,border:`1.5px solid ${C.teal}44`,outline:"none",fontSize:13,fontFamily:"'Nunito',sans-serif",width:"100%"};
      return(<div style={{display:"flex",flexDirection:"column",gap:18}}>
        <div style={{background:"#fff",borderRadius:22,padding:20,boxShadow:"0 4px 20px rgba(0,0,0,0.06)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <button onClick={()=>setVd(new Date(yr,mo-1,1))} style={{background:`${C.teal}22`,border:"none",cursor:"pointer",width:32,height:32,borderRadius:"50%",color:C.teal,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
            <h3 style={{margin:0,fontFamily:"'Fredoka One',cursive",color:C.text,fontSize:17}}>{MONTHS[mo]} {yr}</h3>
            <button onClick={()=>setVd(new Date(yr,mo+1,1))} style={{background:`${C.teal}22`,border:"none",cursor:"pointer",width:32,height:32,borderRadius:"50%",color:C.teal,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:6}}>{DAYS.map(d=><div key={d} style={{textAlign:"center",fontSize:11,fontWeight:700,color:C.muted,padding:"3px 0",fontFamily:"'Nunito',sans-serif"}}>{d}</div>)}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
            {cells.map((d,i)=>{const de=d?getEv(d):[];return<div key={i} style={{minHeight:38,borderRadius:10,padding:"3px 2px",background:isToday(d)?`${C.yellow}33`:"transparent",border:`1.5px solid ${isToday(d)?C.yellow:"transparent"}`}}>{d&&<><div style={{fontSize:12,fontWeight:isToday(d)?800:400,color:isToday(d)?C.teal:C.text,textAlign:"center",fontFamily:"'Nunito',sans-serif"}}>{d}</div><div style={{display:"flex",flexWrap:"wrap",gap:1,justifyContent:"center",marginTop:1}}>{de.slice(0,3).map(e=><div key={e.id} style={{width:5,height:5,borderRadius:"50%",background:e.color}}/>)}</div></>}</div>;})}
          </div>
        </div>
        <div style={{background:"#fff",borderRadius:22,padding:20,boxShadow:"0 4px 20px rgba(0,0,0,0.06)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}><IcoCal s={20}/><h3 style={{margin:0,fontFamily:"'Fredoka One',cursive",color:C.text,fontSize:16}}>Upcoming</h3></div>
            <button onClick={()=>setShowForm(!showForm)} style={{padding:"6px 14px",borderRadius:20,border:"none",background:`linear-gradient(135deg,${C.purple},${C.pink})`,color:"#fff",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"'Nunito',sans-serif"}}>+ Add</button>
          </div>
          {showForm&&<div style={{background:"#faf5f0",borderRadius:14,padding:14,marginBottom:14,display:"flex",flexDirection:"column",gap:8}}>
            <input style={inp} placeholder="Event title" value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))}/>
            <input style={inp} type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))}/>
            <input style={inp} type="time" value={form.time} onChange={e=>setForm(p=>({...p,time:e.target.value}))}/>
            <select style={inp} value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))}>{Object.keys(ILLU).map(c=><option key={c} value={c}>{c}</option>)}</select>
            <button onClick={()=>{onAddEvent(form);setShowForm(false);setForm({title:"",date:"",time:"",category:"personal"});}} style={{padding:"9px",borderRadius:10,border:"none",background:`linear-gradient(135deg,${C.purple},${C.pink})`,color:"#fff",cursor:"pointer",fontWeight:700,fontFamily:"'Nunito',sans-serif"}}>Save Event</button>
          </div>}
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {upcoming.length===0&&<p style={{color:C.muted,fontSize:13,textAlign:"center",fontFamily:"'Nunito',sans-serif"}}>No upcoming events</p>}
            {upcoming.map(e=><div key={e.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:14,background:`${e.color}18`,borderLeft:`3px solid ${e.color}`}}><div style={{flexShrink:0}}>{ILLU[e.category]}</div><div style={{flex:1}}><div style={{fontWeight:700,fontSize:13,color:C.text,fontFamily:"'Nunito',sans-serif"}}>{e.title}</div><div style={{fontSize:11,color:C.muted,fontFamily:"'Nunito',sans-serif"}}>{e.date} · {e.time}</div></div></div>)}
          </div>
        </div>
      </div>);
    }

    function TasksView({tasks,onToggle,onAdd}){
      const[showForm,setShowForm]=useState(false);const[form,setForm]=useState({text:"",priority:"medium",category:"personal",due:""});
      const pending=tasks.filter(t=>!t.done),done=tasks.filter(t=>t.done);
      const inp={padding:"9px 12px",borderRadius:10,border:`1.5px solid ${C.teal}44`,outline:"none",fontSize:13,fontFamily:"'Nunito',sans-serif",width:"100%"};
      return(<div style={{display:"flex",flexDirection:"column",gap:18}}>
        <div style={{background:"#fff",borderRadius:22,padding:20,boxShadow:"0 4px 20px rgba(0,0,0,0.06)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}><IcoList s={22}/><h3 style={{margin:0,fontFamily:"'Fredoka One',cursive",color:C.text,fontSize:18}}>To-Do <span style={{background:`${C.yellow}44`,color:C.teal,borderRadius:20,padding:"2px 10px",fontSize:13}}>{pending.length}</span></h3></div>
            <button onClick={()=>setShowForm(!showForm)} style={{padding:"6px 14px",borderRadius:20,border:"none",background:`linear-gradient(135deg,${C.yellow},${C.teal})`,color:"#fff",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"'Nunito',sans-serif"}}>+ Add</button>
          </div>
          {showForm&&<div style={{background:"#faf5f0",borderRadius:14,padding:14,marginBottom:14,display:"flex",flexDirection:"column",gap:8}}>
            <input style={inp} placeholder="What needs to be done?" value={form.text} onChange={e=>setForm(p=>({...p,text:e.target.value}))}/>
            <div style={{display:"flex",gap:8}}>
              <select style={{...inp,flex:1}} value={form.priority} onChange={e=>setForm(p=>({...p,priority:e.target.value}))}><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select>
              <select style={{...inp,flex:1}} value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))}>{Object.keys(ILLU).map(c=><option key={c} value={c}>{c}</option>)}</select>
            </div>
            <input style={inp} type="date" value={form.due} onChange={e=>setForm(p=>({...p,due:e.target.value}))}/>
            <button onClick={()=>{onAdd(form);setShowForm(false);setForm({text:"",priority:"medium",category:"personal",due:""}); }} style={{padding:"9px",borderRadius:10,border:"none",background:`linear-gradient(135deg,${C.yellow},${C.teal})`,color:"#fff",cursor:"pointer",fontWeight:700,fontFamily:"'Nunito',sans-serif"}}>Save Task</button>
          </div>}
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {pending.length===0&&<div style={{textAlign:"center",padding:"20px 0"}}><IcoCheck s={44} c={C.teal}/><p style={{color:C.muted,fontSize:13,marginTop:10,fontFamily:"'Nunito',sans-serif"}}>All done! You're amazing!</p></div>}
            {pending.map(t=><div key={t.id} onClick={()=>onToggle(t.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",borderRadius:14,background:`${C.orange}22`,cursor:"pointer",border:`1.5px solid ${C.yellow}66`}}>
              <div style={{width:22,height:22,borderRadius:"50%",border:`2.5px solid ${C.teal}`,flexShrink:0}}/>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}><span style={{fontWeight:700,fontSize:13,color:C.text,fontFamily:"'Nunito',sans-serif"}}>{t.text}</span><PriorityPill priority={t.priority}/></div>
                <div style={{display:"flex",alignItems:"center",gap:5,marginTop:4}}>{ILLU[t.category]}<span style={{fontSize:11,color:C.muted,fontFamily:"'Nunito',sans-serif"}}>{t.category}{t.due?` · Due ${t.due}`:""}</span></div>
              </div>
            </div>)}
          </div>
        </div>
        {done.length>0&&<div style={{background:"#fff",borderRadius:22,padding:20,boxShadow:"0 4px 20px rgba(0,0,0,0.06)"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}><IcoCheck s={20}/><h3 style={{margin:0,fontFamily:"'Fredoka One',cursive",color:C.muted,fontSize:16}}>Completed</h3></div>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>{done.map(t=><div key={t.id} onClick={()=>onToggle(t.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 14px",borderRadius:14,background:`${C.teal}12`,cursor:"pointer",opacity:0.75}}><IcoCheck s={20}/><span style={{fontSize:13,color:C.muted,textDecoration:"line-through",fontFamily:"'Nunito',sans-serif"}}>{t.text}</span></div>)}</div>
        </div>}
      </div>);
    }

    function App(){
      const[tab,setTab]=useState("home");const[tasks,setTasks]=useState(initTasks);const[events,setEvents]=useState(initEvents);
      const user={name:"Alex"};const today=new Date();const todayStr=today.toISOString().split("T")[0];
      const todayEvents=events.filter(e=>e.date===todayStr);const pending=tasks.filter(t=>!t.done);
      const catColors={work:C.sky,personal:C.pink,health:C.lime,family:C.purple,shopping:C.orange,other:C.yellow};
      function handleCmd(a){if(a.type==="add_task")setTasks(p=>[...p,{id:Date.now(),text:a.text,done:false,priority:a.priority||"medium",category:a.category||"personal",due:a.due||""}]);else if(a.type==="add_event")setEvents(p=>[...p,{id:Date.now(),title:a.title,date:a.date,time:a.time,color:catColors[a.category]||C.sky,category:a.category||"other"}]);}
      const tabs=[{id:"home",label:"Home",Icon:({a})=><IcoHome s={22} c={a?C.teal:C.muted}/>},{id:"tasks",label:"Tasks",Icon:({a})=><IcoList s={22} c={a?C.teal:C.muted}/>},{id:"calendar",label:"Calendar",Icon:({a})=><IcoCal s={22} c={a?C.teal:C.muted}/>},{id:"chat",label:"Secretary",Icon:({a})=><IcoBot s={22} c={a?C.purple:C.muted}/>}];
      const stats=[{label:"Tasks left",value:pending.length,color:C.pink,Illu:()=><IcoStar s={22} c={C.pink}/>},{label:"Today",value:todayEvents.length,color:C.teal,Illu:()=><IcoCal s={22} c={C.teal}/>},{label:"Done",value:tasks.filter(t=>t.done).length,color:C.yellow,Illu:()=><IcoCheck s={22} c={C.yellow}/>}];
      return(<div style={{maxWidth:420,margin:"0 auto",minHeight:"100vh",display:"flex",flexDirection:"column",background:C.bg}}>
        <div style={{padding:"22px 20px 18px",background:`linear-gradient(135deg,${C.purple}22,${C.pink}18,${C.yellow}22)`,borderBottom:`1px solid ${C.teal}33`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}><IcoSun s={16} c={C.yellow}/><p style={{fontSize:12,color:C.muted,fontWeight:700}}>{greeting()}</p></div><h1 style={{fontSize:26,fontFamily:"'Fredoka One',cursive",color:C.text,lineHeight:1.1}}>{user.name}</h1></div>
            <Avatar name={user.name} size={46}/>
          </div>
          <div style={{display:"flex",gap:10,marginTop:16}}>{stats.map(s=><div key={s.label} style={{flex:1,background:"#fff",borderRadius:16,padding:"12px 8px",textAlign:"center",boxShadow:"0 2px 10px rgba(0,0,0,0.05)"}}><div style={{display:"flex",justifyContent:"center",marginBottom:4}}><s.Illu/></div><div style={{fontSize:22,fontWeight:800,color:s.color,fontFamily:"'Fredoka One',cursive",lineHeight:1}}>{s.value}</div><div style={{fontSize:10,color:C.muted,fontWeight:700,marginTop:2}}>{s.label}</div></div>)}</div>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:tab==="chat"?0:"18px 16px 90px"}}>
          {tab==="home"&&<div style={{display:"flex",flexDirection:"column",gap:16,animation:"fadeIn 0.3s ease"}}>
            <div style={{background:"#fff",borderRadius:22,padding:18,boxShadow:"0 4px 20px rgba(0,0,0,0.06)"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}><IcoCal s={20}/><h3 style={{fontFamily:"'Fredoka One',cursive",color:C.text,fontSize:17,margin:0}}>Today's Schedule</h3></div>
              {todayEvents.length===0?<p style={{color:C.muted,fontSize:13,textAlign:"center",padding:"10px 0",fontFamily:"'Nunito',sans-serif"}}>No events today — enjoy your free day!</p>:todayEvents.map(e=><div key={e.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:12,background:`${e.color}18`,borderLeft:`3px solid ${e.color}`,marginBottom:8}}>{ILLU[e.category]}<div><div style={{fontWeight:700,fontSize:13,color:C.text,fontFamily:"'Nunito',sans-serif"}}>{e.title}</div><div style={{fontSize:11,color:C.muted,fontFamily:"'Nunito',sans-serif"}}>{e.time}</div></div></div>)}
            </div>
            <div style={{background:"#fff",borderRadius:22,padding:18,boxShadow:"0 4px 20px rgba(0,0,0,0.06)"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}><IcoStar s={20} c={C.yellow}/><h3 style={{fontFamily:"'Fredoka One',cursive",color:C.text,fontSize:17,margin:0}}>Priority Tasks</h3></div>
              {pending.filter(t=>t.priority==="high").slice(0,3).map(t=><div key={t.id} onClick={()=>setTasks(p=>p.map(x=>x.id===t.id?{...x,done:true}:x))} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:14,background:`${C.yellow}18`,cursor:"pointer",border:`1px solid ${C.yellow}55`,marginBottom:8}}><div style={{width:20,height:20,borderRadius:"50%",border:`2.5px solid ${C.teal}`,flexShrink:0}}/><span style={{fontSize:13,fontWeight:700,color:C.text,fontFamily:"'Nunito',sans-serif"}}>{t.text}</span></div>)}
              {pending.filter(t=>t.priority==="high").length===0&&<div style={{textAlign:"center",padding:"14px 0"}}><IcoCheck s={36} c={C.teal}/><p style={{color:C.muted,fontSize:13,marginTop:8,fontFamily:"'Nunito',sans-serif"}}>No high priority tasks!</p></div>}
            </div>
            <div onClick={()=>setTab("chat")} style={{background:`linear-gradient(135deg,${C.purple}22,${C.pink}18)`,borderRadius:22,padding:18,boxShadow:"0 4px 20px rgba(0,0,0,0.06)",cursor:"pointer",border:`1.5px solid ${C.purple}33`}}>
              <div style={{display:"flex",alignItems:"center",gap:14}}><div style={{width:48,height:48,borderRadius:"50%",background:`linear-gradient(135deg,${C.purple},${C.pink})`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><IcoBot s={26} c="#fff"/></div><div><div style={{fontFamily:"'Fredoka One',cursive",fontSize:16,color:C.text}}>Talk to your Secretary</div><div style={{fontSize:12,color:C.muted,fontFamily:"'Nunito',sans-serif"}}>Add tasks or events with natural language</div></div></div>
            </div>
          </div>}
          {tab==="tasks"&&<div style={{animation:"fadeIn 0.3s ease",paddingBottom:80}}><TasksView tasks={tasks} onToggle={id=>setTasks(p=>p.map(t=>t.id===id?{...t,done:!t.done}:t))} onAdd={form=>setTasks(p=>[...p,{id:Date.now(),text:form.text,done:false,priority:form.priority,category:form.category,due:form.due}])}/></div>}
          {tab==="calendar"&&<div style={{animation:"fadeIn 0.3s ease",paddingBottom:80}}><CalendarView events={events} onAddEvent={form=>setEvents(p=>[...p,{id:Date.now(),title:form.title,date:form.date,time:form.time,color:catColors[form.category]||C.sky,category:form.category}])}/></div>}
          {tab==="chat"&&<div style={{height:"calc(100vh - 145px)",animation:"fadeIn 0.3s ease"}}><AIChat onCommand={handleCmd}/></div>}
        </div>
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:420,background:"rgba(255,249,242,0.96)",backdropFilter:"blur(14px)",borderTop:`1px solid ${C.teal}33`,padding:"8px 0 18px",display:"flex",justifyContent:"space-around"}}>
          {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:tab===t.id?`${C.yellow}33`:"transparent",border:"none",cursor:"pointer",padding:"7px 18px",borderRadius:16,transition:"all 0.2s"}}><t.Icon a={tab===t.id}/><span style={{fontSize:10,fontWeight:700,color:tab===t.id?C.teal:C.muted,fontFamily:"'Nunito',sans-serif"}}>{t.label}</span></button>)}
        </div>
      </div>);
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
